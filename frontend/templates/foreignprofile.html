<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foreign Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/foreignprofile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Top Navbar -->
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <img src="../static/resources/BlackBookLogo.png" class="book-svg" alt="BookXchange Logo">
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Find books" id="searchInput">
                <i class="fas fa-search"></i>
            </div>
            <div class="header-actions">
                <button class="chat-btn" onclick="goToMyMessages()">
                    <i class="fas fa-comments"></i>
                </button>
                <button class="profile-btn" onclick="goToProfile()">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <section class="profile-section">
                <div class="profile-header">
                    <div class="avatar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <div class="profile-info">
                        <h1>Jane Doe</h1>
                        <a href="mailto:johndoe@gmail.com" class="email">johndoe@gmail.com</a>
                    </div>
                </div>
                <div class="info-bubble about-me">
                    <h3>About me:</h3>
                    <p>I am John Doe, an Information Systems student with all the dreams in the world...</p>
                </div>
                <div class="info-bubble interests">
                    <h3>My interests:</h3>
                    <p class="tags">Horror, Thriller; Romance</p>
                </div>
            </section>

            <!-- Listings Section -->
            <section class="listings-section">
                <h2>Jane Doe's Listings</h2>
                <div id="listings-grid" class="listings-grid">
                    <!-- Listings will be injected here by JavaScript -->
                </div>
            </section>
        </main>

        <!-- Floating Notch Navbar -->
        <nav class="bottom-nav">
            <button class="nav-btn active" onclick="goToHome()">
                <i class="fas fa-book"></i>
            </button>
            <button class="nav-btn" onclick="goToAnnouncements()">
                <i class="fas fa-search"></i>
            </button>
            <button class="nav-btn" onclick="goToFavorites()">
                <i class="fas fa-heart"></i>
            </button>
        </nav>
    </div>
    <script src="../static/foreignprofile.js"></script>
</body>
</html>
