<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Messages</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Files -->
    <link rel="stylesheet" href="../static/header.css">
    <link rel="stylesheet" href="../static/messages.css">
    <link rel="stylesheet" href="../static/header.css">
    <link rel="stylesheet" href="../static/home.css">
    <link rel="stylesheet" href="../static/messages.css">

    <!-- Scripts -->
    <script src="../static/config.js"></script>
    <script src="../static/api.js"></script>
    <script src="../static/include.js"></script>
    <script src="../static/messages.js"></script>
</head>

<body>

    <main class="messages-container">
        <!-- Chat Header -->
        <header class="chat-header">
            <button class="back-btn-header" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            
            <div class="user-info-header" id="userInfoHeader">
                <div class="user-avatar-header" id="headerAvatar">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white"
                        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="user-details-header">
                    <h2 class="user-name-header" id="headerName">User Name</h2>
                    <span class="user-role-header" id="headerRole">Seller</span>
                </div>
            </div>
        </header>

        <!-- Book Info Bar -->
        <div class="book-info-bar" id="bookInfoBar">
            <img id="bookImage" src="../static/resources/placeholder.jpg" alt="Book" class="book-thumbnail"
                onerror="this.src='../static/resources/placeholder.jpg'">
            <div class="book-details-compact">
                <h3 class="book-title-compact" id="bookTitle">Book Title</h3>
                <p class="book-author-compact" id="bookAuthor">Author Name</p>
                <div class="book-meta-compact">
                    <span class="book-price-compact" id="bookPrice">€0.00</span>
                    <span class="book-condition-compact" id="bookCondition">Condition</span>
                </div>
            </div>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-messages-area" id="chatMessages">
            <!-- Messages will be loaded here -->
        </div>

        <!-- Chat Input -->
        <form class="chat-input-container" id="chatForm">
            <!-- Deal Button -->
            <button type="button" class="deal-btn-input" id="dealButton" aria-label="Close Deal">
                <img src="../static/resources/svg/handshake.svg" width="24" height="24" alt="Deal">
            </button>

            <input type="text" id="messageInput" class="message-input" placeholder="Type a message..." autocomplete="off">
            
            <button type="submit" class="send-btn-input" aria-label="Send message">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </main>
</body>

</html>
