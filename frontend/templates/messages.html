<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Messages</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Files -->
    <link rel="stylesheet" href="../static/messages.css">
    <link rel="stylesheet" href="../static/header.css">

    <!-- Script to load header -->
    <script src="../static/include.js"></script>

    <!-- Page JavaScript - Load BEFORE body for onclick to work -->
    <script src="../static/messages.js"></script>
</head>

<body>

    <!-- Header will be loaded here -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Back Button -->
        <div class="back-button-container">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
                <span>Back</span>
            </button>
        </div>

        <div class="content-wrapper">

            <!-- Left Column: Profile Info -->
            <aside class="profile-section">
                <div class="profile-header">
                    <div class="avatar-large">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white"
                            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <h1 class="profile-name">John Doe</h1>
                </div>
            </aside>

            <!-- Right Column: Chat Interface -->
            <section class="chat-interface">
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <!-- Date Separator -->
                        <div class="chat-date">Today</div>

                        <!-- Received Message (John) -->
                        <div class="message received">
                            <div class="message-content">
                                <p>Hi! Is the copy of "War and Peace" still available?</p>
                                <span class="message-time">10:30 AM</span>
                            </div>
                        </div>

                        <!-- Sent Message (User) -->
                        <div class="message sent">
                            <div class="message-content">
                                <p>Yes, it is! I can meet you in Benfica tomorrow.</p>
                                <span class="message-time">10:32 AM</span>
                            </div>
                        </div>

                        <!-- Received Message (John) -->
                        <div class="message received">
                            <div class="message-content">
                                <p>Great! 5,00 $ right?</p>
                                <span class="message-time">10:35 AM</span>
                            </div>
                        </div>
                    </div>

                    <form class="chat-input-area" id="chatForm">
                        <button type="button" class="attach-btn" aria-label="Attach file">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                            </svg>
                        </button>
                        <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                        <button type="submit" class="send-btn" aria-label="Send message">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </div>
            </section>

        </div>
    </main>


</body>

</html>
