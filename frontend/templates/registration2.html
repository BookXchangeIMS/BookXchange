<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Registration (Step 2)</title>
    <link rel="stylesheet" href="/static/registration2.css">
</head>

<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Logo Icon -->
        <div class="logo-icon">
            <img src="/static/resources/BlackBookLogo.png" class="book-svg" alt="BookXchange Logo">
        </div>

        <!-- Title -->
        <h1 class="title">Registration</h1>

        <!-- Form -->
        <form class="form-group" onsubmit="handleRegistration2(event)">
            <div class="input-group">
                <label class="input-label">Date of Birth:</label>
                <input type="date" class="input-field date-input" required max="">
            </div>

            <div class="input-group">
                <label class="input-label">District in Portugal:</label>
                <select class="input-field select-input" required>
                    <option value="" disabled selected>Select your district</option>
                    <option value="Aveiro">Aveiro</option>
                    <option value="Beja">Beja</option>
                    <option value="Braga">Braga</option>
                    <option value="Bragança">Bragança</option>
                    <option value="Castelo Branco">Castelo Branco</option>
                    <option value="Coimbra">Coimbra</option>
                    <option value="Évora">Évora</option>
                    <option value="Faro">Faro</option>
                    <option value="Guarda">Guarda</option>
                    <option value="Leiria">Leiria</option>
                    <option value="Lisboa">Lisboa</option>
                    <option value="Portalegre">Portalegre</option>
                    <option value="Porto">Porto</option>
                    <option value="Santarém">Santarém</option>
                    <option value="Setúbal">Setúbal</option>
                    <option value="Viana do Castelo">Viana do Castelo</option>
                    <option value="Vila Real">Vila Real</option>
                    <option value="Viseu">Viseu</option>
                    <option value="Açores">Açores</option>
                    <option value="Madeira">Madeira</option>
                </select>
            </div>

            <div class="button-container">
                <button type="button" class="nav-btn" onclick="goBack()">Back</button>
                <button type="submit" class="submit-btn">
                    <span class="arrow">→</span>
                </button>
            </div>
        </form>
    </div>

    <script src="/static/registration2.js"></script>
</body>

</html>
