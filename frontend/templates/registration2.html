<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Registration (Step 2)</title>
    <link rel="stylesheet" href="../static/registration2.css">
</head>

<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Logo Icon -->
        <div class="logo-icon">
            <img src="../static/resources/BlackBookLogo.png" class="book-svg" alt="BookXchange Logo">
        </div>

        <!-- Title -->
        <h1 class="title">Registration</h1>

        <!-- Form -->
        <form class="form-group" onsubmit="handleRegistration2(event)">
            <div class="input-group">
                <label class="input-label">Date of Birth:</label>
                <input type="date" class="input-field date-input" required max="">
            </div>

            <div class="input-group">
                <label class="input-label">Address:</label>
                <input type="text" class="input-field address-input" required placeholder="Enter your address">
            </div>

            <div class="button-container">
                <button type="button" class="nav-btn" onclick="goBack()">Back</button>
                <button type="submit" class="submit-btn">
                    <span class="arrow">→</span>
                </button>
            </div>
        </form>
    </div>

    <script src="../static/registration2.js"></script>
</body>

</html>
