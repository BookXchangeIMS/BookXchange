<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../static/header.css">
  <link rel="stylesheet" href="../static/footer.css">
  <link rel="stylesheet" href="../static/editprofile.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="../static/include.js"></script>
</head>

<body>
  <div class="app-container">
    <!-- Header Section -->
    <div id="header-placeholder"></div>

    <main class="main-content">
      <section class="edit-profile-section">
        <h1>Edit profile</h1>

        <form id="editProfileForm">
          <div class="avatar-edit-wrapper">
            <div class="avatar-preview">
              <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="fullName">Name</label>
              <input type="text" id="fullName" name="fullName" required>
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required readonly>
            </div>

            <div class="form-group form-group-full">
              <label for="aboutMe">About me</label>
              <textarea id="aboutMe" name="aboutMe" rows="4"></textarea>
            </div>

            <div class="form-group form-group-full">
              <label>Preferred Genres</label>

              <!-- Selected genres display -->
              <div id="selectedGenres" class="selected-genres"></div>

              <!-- Available genres to choose from -->
              <div class="genre-selection">
                <label class="subtitle-label">Available genres:</label>
                <div id="availableGenres" class="genre-checkboxes"></div>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="secondary-btn" onclick="goToProfile()">
              Back
            </button>
            <button type="submit" class="primary-btn">
              Save changes
            </button>
          </div>

          <p id="formMessage" class="form-message"></p>
        </form>
      </section>
    </main>

    <!-- Bottom nav -->
    <div id="footer-placeholder"></div>
  </div>

  <script src="../static/editprofile.js"></script>
</body>

</html>
