<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Add Listing</title>
    <link rel="stylesheet" href="../static/editlisting.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Back Button -->
    <button class="back-btn" onclick="showCancelModal()">
        <i class="fas fa-arrow-left"></i>
    </button>

    <!-- Main Content -->
    <main>
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="../static/resources/add_listing.png" class="logo-img" alt="Add Listing">
            <img src="../static/resources/add_listing_phone.png" class="logo-img-mobile" alt="Add Listing">
        </div>

        <form id="addListingForm">
            <!-- AI Scan Section -->
            <div class="ai-scan-section">
                <button type="button" class="scan-btn-prominent" onclick="document.getElementById('scanInput').click()">
                    <i class="fas fa-magic"></i>
                    <div class="scan-btn-text">
                        <span class="scan-btn-title">Scan Book with AI</span>
                        <span class="scan-btn-subtitle">Auto-fill details from book cover</span>
                    </div>
                </button>
                <input type="file" id="scanInput" accept="image/*" style="display: none;"
                    onchange="handleScanBook(event)">
            </div>

            <!-- Or Divider -->
            <div class="or-divider">
                <span>Or</span>
            </div>

            <!-- Multiple Image Upload Section -->
            <div class="form-section">
                <div class="image-upload-container">
                    <!-- Upload Zone -->
                    <div class="upload-zone" id="uploadZone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click or drag images here</p>
                        <span class="upload-hint">Max 10 images, 10MB each</span>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">


                    <!-- Image Preview Grid -->
                    <div class="image-preview-grid" id="imagePreviewGrid">
                        <!-- Images will be dynamically added here -->
                    </div>
                </div>
            </div>

            <!-- Book Title -->
            <div class="form-section">
                <label for="bookTitle" class="form-label">Title <span class="required">*</span></label>
                <input type="text" id="bookTitle" class="form-input" placeholder="Enter book title" required>
            </div>

            <!-- Author -->
            <div class="form-section">
                <label for="bookAuthor" class="form-label">Author <span class="required">*</span></label>
                <input type="text" id="bookAuthor" class="form-input" placeholder="Enter author name" required>
            </div>

            <!-- Listing Type Selection -->
            <div class="form-section">
                <label class="form-label">Listing Type <span class="required">*</span></label>
                <div class="listing-type-options">
                    <label class="type-option">
                        <input type="radio" name="listingType" value="Sale">
                        <span class="type-label">
                            <i class="fas fa-tag"></i>
                            Sale
                        </span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="listingType" value="Exchange">
                        <span class="type-label">
                            <i class="fas fa-exchange-alt"></i>
                            Exchange
                        </span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="listingType" value="Donation" checked>
                        <span class="type-label">
                            <i class="fas fa-gift"></i>
                            Donation
                        </span>
                    </label>
                </div>
            </div>

            <!-- Price and Year Grid -->
            <div class="form-grid">
                <div class="form-section hidden" id="priceSection">
                    <label for="bookPrice" class="form-label">Price</label>
                    <input type="text" id="bookPrice" class="form-input" placeholder="$0.00">
                </div>

                <div class="form-section">
                    <label for="bookYear" class="form-label">Publication Year</label>
                    <input type="number" id="bookYear" class="form-input" placeholder="2024" min="1000" max="2025">
                </div>
            </div>

            <!-- Condition and Location Grid -->
            <div class="form-grid">
                <div class="form-section">
                    <label for="bookCondition" class="form-label">Condition <span class="required">*</span></label>
                    <select id="bookCondition" class="form-select" required>
                        <option value="">Select condition</option>
                        <option value="Almost new">Almost new</option>
                        <option value="Good">Good</option>
                        <option value="Fair">Fair</option>
                        <option value="Poor">Poor</option>
                    </select>
                </div>

                <div class="form-section">
                    <label for="bookLocation" class="form-label">Location <span class="required">*</span></label>
                    <input type="text" id="bookLocation" class="form-input" placeholder="City, Country" required>
                </div>
            </div>

            <!-- Genres -->
            <div class="form-section">
                <label class="form-label">Genres</label>
                <div class="genre-selection-container">
                    <div id="availableGenres" class="genre-checkboxes">
                        <!-- Genres will be populated here via JavaScript -->
                        <div class="loading-genres">Loading genres...</div>
                    </div>
                </div>
            </div>

            <!-- Description -->
            <div class="form-section">
                <label for="bookDescription" class="form-label">Description</label>
                <textarea id="bookDescription" class="form-textarea" rows="6"
                    placeholder="Describe your book, its condition, and why you're selling it..."></textarea>
                <p class="form-hint character-count"><span id="charCount">0</span>/500 characters</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button type="button" class="btn-secondary" onclick="showCancelModal()">
                    Cancel
                </button>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-plus-circle"></i> Submit
                </button>
            </div>
        </form>
    </main>

    <!-- Cancel Confirmation Modal -->
    <div id="cancelModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h2 class="modal-title">Discard Changes?</h2>
            <p class="modal-message">
                Are you sure you want to leave?<br><br>
                • All entered data will be lost<br>
                • Images will not be saved<br>
                • Book details will be cleared<br><br>
                <strong>This action cannot be undone!</strong>
            </p>
            <div class="modal-actions">
                <button class="modal-btn cancel-modal-btn" onclick="closeCancelModal()">Stay</button>
                <button class="modal-btn confirm-modal-btn" onclick="confirmCancel()">Leave</button>
            </div>
        </div>
    </div>

    <!-- Load the main script -->
    <script src="../static/addlisting.js"></script>
</body>

</html>
