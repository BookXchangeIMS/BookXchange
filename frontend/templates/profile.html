<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Profile</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Files -->
    <link rel="stylesheet" href="../static/profile.css">
    <link rel="stylesheet" href="../static/header.css">

    <!-- Script to load header -->
    <script src="../static/include.js"></script>

    <!-- Page JavaScript -->
    <script src="../static/api.js"></script>
    <script src="../static/profile.js"></script>
</head>

<body>

    <!-- Header will be loaded here -->
    <div id="header-placeholder"></div>

    <!-- Back Button -->
    <button class="back-btn" onclick="goBack()" aria-label="Go back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Profile Card -->
        <div class="profile-card">

            <!-- Profile Header -->
            <div class="profile-header">
                <div class="avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="profile-info">
                    <h1 id="userName">Hello, User!</h1>
                    <p class="email" id="userEmail">user@email.com</p>
                </div>
            </div>

            <!-- About Section -->
            <div class="info-section">
                <h3><i class="fas fa-info-circle"></i> About Me</h3>
                <p id="aboutText">Loading...</p>
            </div>

            <!-- Interests Section -->
            <div class="info-section">
                <h3><i class="fas fa-heart"></i> My Interests</h3>
                <p id="interestsText">Loading...</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn" onclick="window.location.href='editprofile.html'">
                    <i class="fas fa-edit"></i>
                    <span>Edit Profile</span>
                </button>
                <button class="action-btn" onclick="viewTransactionHistory()">
                    <i class="fas fa-history"></i>
                    <span>Transaction History</span>
                </button>
            </div>

            <!-- Logout Button -->
            <button class="logout-btn" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>

        </div>

    </main>

    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-icon">
                <i class="fas fa-sign-out-alt"></i>
            </div>
            <h2 class="modal-title">Log Out?</h2>
            <p class="modal-message">
                Are you sure you want to log out of your account?
            </p>
            <div class="modal-actions">
                <button class="modal-btn cancel-modal-btn" onclick="closeLogoutModal()">Cancel</button>
                <button class="modal-btn confirm-modal-btn" onclick="confirmLogout()">Log Out</button>
            </div>
        </div>
    </div>

    <!-- NO FOOTER -->

</body>

</html>
