<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - My Favorites</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="../static/favourites.css">
    <link rel="stylesheet" href="../static/header.css">
    <link rel="stylesheet" href="../static/footer.css">
    
    <!-- Script to load header and footer -->
    <script src="../static/include.js"></script>
</head>
<body>
    <!-- Header-->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main>
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="../static/resources/your_wishlist.png" alt="BookXchange Logo" class="logo-img">
        </div>

        <section class="book-listings">
            <div class="books-grid" id="favoritesGrid">
                <!-- Favorite books will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Page JavaScript -->
    <script src="../static/favourites.js"></script>
</body>
</html>
