<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - My Favorites</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Files -->
    <link rel="stylesheet" href="../static/favourites.css">
    <link rel="stylesheet" href="../static/header.css">
    <link rel="stylesheet" href="../static/footer.css">

    <!-- Script to load header and footer -->
    <script src="../static/config.js"></script>
    <script src="../static/include.js?v=2"></script>
    <script src="../static/config.js"></script>
    <script src="../static/api.js"></script>
</head>

<body>
    <!-- Header-->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main>
        <!-- Logo Section -->
        <div class="logo-section fade-in">
            <img src="../static/resources/your_wishlist.png" alt="BookXchange Logo" class="logo-img">
        </div>

        <section class="book-listings">
            <div class="books-grid" id="favoritesGrid">
                <!-- Favorite books will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Remove Favorite Modal -->
    <div class="modal-overlay" id="removeModal">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-heart-broken"></i>
            </div>
            <h3 class="modal-title">Remove from Favorites?</h3>
            <p class="modal-message">Are you sure you want to remove this book from your wishlist?</p>
            <div class="modal-actions">
                <button class="modal-btn cancel-btn" onclick="closeRemoveModal()">Cancel</button>
                <button class="modal-btn confirm-btn" onclick="confirmRemoveFavorite()">Remove</button>
            </div>
        </div>
    </div>

    <!-- Page JavaScript -->
    <script src="../static/config.js"></script>
    <script src="../static/favourites.js"></script>
</body>

</html>
