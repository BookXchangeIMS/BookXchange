<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Favourites</title>
    <link rel="stylesheet" href="../static/favourites.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header Section -->
    <header>
        <div class="logo">
            <div class="logo-icon">
                <img src="../static/resources/BlackBookLogo.png" class="book-svg" alt="BookXchange Logo">
            </div>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Find books" id="searchInput">
            <i class="fas fa-search"></i>
        </div>
        <div class="header-actions">
            <button class="chat-btn" onclick="goToMessages()">
                <i class="fas fa-comments"></i>
            </button>
            <button class="profile-btn" onclick="goToProfile()">
                <i class="fas fa-user"></i>
            </button>
        </div>
    </header>
    <!-- Main Content -->
    <main>
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="../static/resources/BlackBookLogo.png" class="logo-img" alt="BookXchange Logo">
            <h1 class="logo-text">Your <span class="highlight">Favourites</span></h1>
            <p class="tagline">Books you love</p>
        </div>
        <section class="book-listings">
            <div class="books-grid" id="favoritesGrid">
                <!-- Favourites will be dynamically loaded here -->
            </div>
        </section>
    </main>
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-btn" onclick="goToHome()">
            <i class="fas fa-book"></i>
        </button>
        <button class="nav-btn" onclick="goToAnnouncements()">
            <i class="fas fa-search"></i>
        </button>
        <button class="nav-btn active" onclick="goToFavorites()">
            <i class="fas fa-heart"></i>
        </button>
    </nav>
    <script src="../static/favourites.js"></script>
</body>
</html>
