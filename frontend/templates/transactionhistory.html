<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - BookXchange</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- SAME CSS as home page -->
    <link rel="stylesheet" href="/static/header.css">
    <link rel="stylesheet" href="/static/footer.css">
    <link rel="stylesheet" href="/static/transactionhistory.css">

    <!-- Script to load header and footer - SAME as home page -->
    <script src="/static/include.js?v=2"></script>
</head>

<body>
    <!-- Header - LOADED BY include.js -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main>
        <div class="page-header">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <h1 class="page-title">Transaction History</h1>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all" onclick="filterTransactions('all')">
                All
            </button>
            <button class="filter-tab" data-filter="sold" onclick="filterTransactions('sold')">
                <i class="fas fa-arrow-up"></i> Sold
            </button>
            <button class="filter-tab" data-filter="bought" onclick="filterTransactions('bought')">
                <i class="fas fa-arrow-down"></i> Bought
            </button>
        </div>

        <section class="transactions-section">
            <div class="transactions-grid skeleton-grid" id="skeletonGrid">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
            <div class="transactions-grid" id="transactionsGrid" style="display: none;"></div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-receipt"></i>
                <h3>No transactions found</h3>
                <p>Your transaction history will appear here once you complete some trades.</p>
            </div>
        </section>
    </main>

    <!-- Footer - LOADED BY include.js -->
    <div id="footer-placeholder"></div>

    <!-- Transaction History JS -->
    <script src="/static/transactionhistory.js"></script>
    </head>
</body>

</html>
