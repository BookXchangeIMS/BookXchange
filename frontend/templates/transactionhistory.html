<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Transaction History</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Files -->
    <link rel="stylesheet" href="../static/transactionhistory.css">
    <link rel="stylesheet" href="../static/header.css">
    <link rel="stylesheet" href="../static/footer.css">

    <!-- Script to load header and footer -->
    <script src="../static/include.js"></script>
    <script src="../static/api.js"></script>
</head>

<body>
    <!-- Header-->
    <div id="header-placeholder"></div>

    <!-- Back Button -->
    <button class="back-btn" onclick="goBack()" aria-label="Go back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <!-- Main Content -->
    <main>
        <!-- Logo Section -->
        <div class="logo-section fade-in">
            <h1 class="page-title">Transaction History</h1>
            <p class="page-subtitle">View your purchase and sales history</p>
        </div>

        <!-- Transactions Container -->
        <div class="transactions-container">
            <!-- Purchases Section -->
            <section class="transactions-section purchases-section">
                <h2 class="section-title">
                    <i class="fas fa-shopping-bag"></i>
                    My Purchases
                </h2>
                <div id="purchasesGrid" class="transactions-grid">
                    <!-- Purchase transactions will be loaded here -->
                </div>
            </section>

            <!-- Sales Section -->
            <section class="transactions-section sales-section">
                <h2 class="section-title">
                    <i class="fas fa-hand-holding-usd"></i>
                    My Sales
                </h2>
                <div id="salesGrid" class="transactions-grid">
                    <!-- Sale transactions will be loaded here -->
                </div>
            </section>
        </div>
    </main>

    <!-- Footer - LOADED BY include.js -->
    <div id="footer-placeholder"></div>

    <!-- Transaction History JS -->
    <script src="/static/transactionhistory.js"></script>
    </head>
</body>

</html>
