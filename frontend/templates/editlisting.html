<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Edit Listing</title>
    <link rel="stylesheet" href="../static/editlisting.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Back Button -->
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
    </button>

    <!-- Main Content -->
    <main>
        <h1 class="page-title">Edit Listing</h1>

        <form id="editListingForm">
            <!-- Multiple Image Upload Section -->
            <div class="form-section">
                <label class="form-label">Book Photos (Max 10)</label>
                <div class="image-upload-container">
                    <!-- Upload Zone -->
                    <div class="upload-zone" id="uploadZone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click or drag images here</p>
                        <span class="upload-hint">Max 10 images, 10MB each</span>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">

                    <!-- Add Upload Button -->
                    <button type="button" class="change-image-btn"
                        onclick="document.getElementById('imageInput').click()">
                        <i class="fas fa-camera"></i> Add Images
                    </button>

                    <!-- Image Preview Grid -->
                    <div class="image-preview-grid" id="imagePreviewGrid">
                        <!-- Images will be dynamically added here -->
                    </div>
                </div>
            </div>

            <!-- Book Title -->
            <div class="form-section">
                <label for="bookTitle" class="form-label">Title <span class="required">*</span></label>
                <input type="text" id="bookTitle" class="form-input" placeholder="Enter book title" required>
            </div>

            <!-- Author -->
            <div class="form-section">
                <label for="bookAuthor" class="form-label">Author <span class="required">*</span></label>
                <input type="text" id="bookAuthor" class="form-input" placeholder="Enter author name" required>
            </div>

            <!-- Price and Year Grid -->
            <div class="form-grid">
                <div class="form-section">
                    <label for="bookPrice" class="form-label">Price <span class="required">*</span></label>
                    <input type="text" id="bookPrice" class="form-input" placeholder="$0.00" required>
                </div>

                <div class="form-section">
                    <label for="bookYear" class="form-label">Publication Year</label>
                    <input type="number" id="bookYear" class="form-input" placeholder="2024" min="1000" max="2025">
                </div>
            </div>

            <!-- Condition and Location Grid -->
            <div class="form-grid">
                <div class="form-section">
                    <label for="bookCondition" class="form-label">Condition <span class="required">*</span></label>
                    <select id="bookCondition" class="form-select" required>
                        <option value="">Select condition</option>
                        <option value="Almost new">Almost new</option>
                        <option value="Good">Good</option>
                        <option value="Fair">Fair</option>
                        <option value="Poor">Poor</option>
                    </select>
                </div>

                <div class="form-section">
                    <label for="bookLocation" class="form-label">Location <span class="required">*</span></label>
                    <input type="text" id="bookLocation" class="form-input" placeholder="City, Country" required>
                </div>
            </div>

            <!-- Genres -->
            <div class="form-section">
                <label for="bookGenres" class="form-label">Genres</label>
                <input type="text" id="bookGenres" class="form-input" placeholder="e.g., Fantasy, Adventure">
                <p class="form-hint">Separate multiple genres with commas</p>
            </div>

            <!-- Description -->
            <div class="form-section">
                <label for="bookDescription" class="form-label">Description</label>
                <textarea id="bookDescription" class="form-textarea" rows="6"
                    placeholder="Describe your book, its condition, and why you're selling it..."></textarea>
                <p class="form-hint character-count"><span id="charCount">0</span>/500 characters</p>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button type="button" class="btn-secondary" onclick="confirmCancel()">
                    Cancel
                </button>
                <button type="button" class="btn-delete" onclick="confirmDelete()">
                    <i class="fas fa-trash"></i> Delete Listing
                </button>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </div>
        </form>
    </main>

    <!-- Load mock data first, then the main script -->
    <script src="../static/mockdata.js"></script>
    <script src="../static/editlisting-multiple.js"></script>
</body>

</html>
