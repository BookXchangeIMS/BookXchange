<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Leaderboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS Files -->
    <link rel="stylesheet" href="../static/common.css">
    <link rel="stylesheet" href="../static/header.css">
    <link rel="stylesheet" href="../static/footer.css">
    <link rel="stylesheet" href="../static/leaderboard.css">

    <!-- Script to load header and footer -->
    <script src="../static/include.js?v=2"></script>
</head>

<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="container mt-xl mb-xl leaderboard-page">
        <h1 class="title text-center">Community Leaderboard</h1>
        <p class="subtitle text-center mb-lg" style="color: var(--text-gray);">Top contributors making a difference</p>

        <div class="leaderboard-container">
            <div class="leaderboard-header">
                <div class="rank-col">Rank</div>
                <div class="user-col">User</div>
                <div class="points-col" id="points-col-header">Points</div>
            </div>
            <div id="leaderboard-list">
                <!-- Data will be populated by leaderboard.js -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- JS -->
    <script src="../static/config.js"></script>
    <script src="../static/utils.js"></script>
    <script src="../static/ui-components.js"></script>
    <script src="../static/leaderboard.js"></script>
</body>

</html>
