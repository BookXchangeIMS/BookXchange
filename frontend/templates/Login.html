<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Login</title>
    <link rel="stylesheet" href="/static/login.css">
</head>

<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Logo Icon -->
        <div class="logo-icon">
            <img src="/static/resources/BlackBookLogo.png" class="book-svg" alt="BookXchange Logo">
        </div>

        <!-- Logo Text -->
        <h1 class="logo-text">Book<span class="highlight">X</span>change</h1>

        <!-- Form -->
        <form class="form-group" onsubmit="handleLogin(event)">
            <input type="email" class="input-field" placeholder="Email" required>
            <input type="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="login-btn">Log in</button>
        </form>

        <!-- Register Section -->
        <div class="register-section">
            <p class="register-text">Don't have an account?</p>
            <button class="register-btn" onclick="handleRegister()">Register</button>
        </div>
    </div>

    <script src="/static/api.js"></script>
    <script src="/static/Login.js"></script>

</body>

</html>
