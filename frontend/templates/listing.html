<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Listing Details</title>
    <link rel="stylesheet" href="../static/listing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Back Button -->
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
    </button>

    

    <!-- Main Content -->
    <main>
        <!-- Book Image -->
        <div class="book-image-container">
            <img id="bookImage" src="" alt="Book Cover" class="book-image">
        </div>

        <!-- Book Title -->
        <h1 class="book-title" id="bookTitle">Loading...</h1>

        <!-- Details Grid -->
        <div class="details-grid">
            <!-- Author -->
            <div class="detail-card">
                <p class="detail-label">Author:</p>
                <p class="detail-value" id="bookAuthor">-</p>
            </div>

            <!-- Price -->
            <div class="detail-card">
                <p class="detail-label">Price</p>
                <p class="detail-value price" id="bookPrice">-</p>
            </div>

            <!-- Publication Year -->
            <div class="detail-card">
                <p class="detail-label">Publication Year:</p>
                <p class="detail-value" id="bookYear">-</p>
            </div>

            <!-- Conservation -->
            <div class="detail-card">
                <p class="detail-label">Conservation:</p>
                <p class="detail-value" id="bookCondition">-</p>
            </div>

            <!-- Genres -->
            <div class="detail-card">
                <p class="detail-label">Genres:</p>
                <p class="detail-value" id="bookGenres">-</p>
            </div>

            <!-- Location -->
            <div class="detail-card">
                <p class="detail-label">Location:</p>
                <p class="detail-value" id="bookLocation">-</p>
            </div>
        </div>

        <!-- Description -->
        <div class="description-section">
            <p class="description-text" id="bookDescription">
                Loading description...
            </p>
        </div>

        <!-- Seller Section -->
        <div class="seller-section" onclick="goToSellerProfile()">
            <div class="seller-avatar">
                <i class="fas fa-user"></i>
            </div>
            <h2 class="seller-name" id="sellerName">John Doe</h2>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="message-btn" onclick="sendMessage()">
                Send a message!
            </button>
            <button class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite()">
                <i class="fas fa-heart"></i>
            </button>
        </div>
    </main>

    <script src="../static/listing.js"></script>
</body>
</html>
