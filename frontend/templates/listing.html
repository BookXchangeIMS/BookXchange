<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Book Details</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS File -->
    <link rel="stylesheet" href="../static/listing.css">

    <!-- Page JavaScript -->
    <script src="../static/listing.js"></script>
</head>

<body>

    <!-- Floating Back Button -->
    <button class="back-btn" onclick="goBack()" aria-label="Go back">
        <i class="fas fa-arrow-left"></i>
    </button>

    <!-- Main Container -->
    <div class="container">

        <!-- Gallery Section: Multiple Images -->
        <section class="gallery-section">

            <!-- Main Image Display -->
            <div class="main-image-wrapper">
                <img id="mainImage" src="" alt="Book Cover" class="main-image">
                <button class="favorite-btn-hero" id="favoriteBtn" onclick="toggleFavorite()"
                    aria-label="Add to favorites">
                    <i class="fas fa-heart"></i>
                </button>
            </div>

            <!-- Thumbnail Gallery -->
            <div class="thumbnail-gallery" id="thumbnailGallery">
                <!-- Thumbnails will be loaded here dynamically -->
            </div>

        </section>

        <!-- Content Section -->
        <section class="content-section">

            <!-- Book Title & Author -->
            <div class="title-section">
                <h1 id="bookTitle" class="book-title">Book Title</h1>
                <p class="book-author">by <span id="bookAuthor">Author Name</span></p>
            </div>

            <!-- Price Badge -->
            <div class="price-badge">
                <span class="price-label">Price</span>
                <span id="bookPrice" class="price-value">$0.00</span>
            </div>

            <!-- Quick Info Pills -->
            <div class="info-pills">
                <div class="pill">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="bookYear">Year</span>
                </div>
                <div class="pill">
                    <i class="fas fa-star"></i>
                    <span id="bookCondition">Condition</span>
                </div>
                <div class="pill">
                    <i class="fas fa-tag"></i>
                    <span id="bookGenres">Genres</span>
                </div>
                <div class="pill">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="bookLocation">Location</span>
                </div>
            </div>

            <!-- Description Card -->
            <div class="description-card">
                <h3 class="section-title">About this book</h3>
                <p id="bookDescription" class="description-text">Book description goes here...</p>
            </div>

            <!-- Seller Card -->
            <div class="seller-card" onclick="goToSellerProfile()">
                <div class="seller-info">
                    <div class="seller-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="seller-details">
                        <span class="seller-label">Seller</span>
                        <h4 id="sellerName" class="seller-name">Seller Name</h4>
                    </div>
                </div>
                <i class="fas fa-chevron-right seller-arrow"></i>
            </div>

            <!-- CTA: Message Seller Button -->
            <button class="cta-btn" onclick="sendMessage()">
                <i class="fas fa-comment-dots"></i>
                <span>Message Seller</span>
            </button>

        </section>

    </div>

    <!-- Zoom Overlay Modal -->
    <div id="zoomOverlay" class="zoom-overlay">
        <button id="zoomBackBtn" class="zoom-back-btn" aria-label="Close zoom">
            <i class="fas fa-times"></i>
        </button>
        <img id="zoomedImage" src="" alt="Zoomed Book Image" class="zoomed-image">
    </div>

</body>

</html>
