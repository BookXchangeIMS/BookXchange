<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookXchange - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('resources/Bookbackground.png');
            background-size: auto;
            background-repeat: repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background book illustrations */
        .book-pattern {
            display: none;
            opacity: 0.3;
        }

        .container {
            position: relative;
            z-index: 10;
        }


        .container {
            background-color: rgba(245, 237, 227, 0.95);
            padding: 60px 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        /* BookXchange Icon */
        .logo-icon {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80px;
        }

        .book-svg {
            width: 90px;
            height: 90px;
        }

        /* Logo Text */
        .logo-text {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 50px;
            color: #1a1a2e;
        }

        .logo-text .highlight {
            color: #c84c3d;
        }

        /* Form */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-field {
            padding: 18px 25px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            background-color: #c84c3d;
            color: white;
            transition: all 0.3s ease;
            cursor: text;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.9);
        }

        .input-field:focus {
            outline: none;
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(200, 76, 61, 0.3);
        }

        /* Login Button */
        .login-btn {
            padding: 16px 40px;
            border: 3px solid #2563eb;
            background-color: #1e3a8a;
            color: white;
            font-size: 18px;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }

        .login-btn:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4);
        }

        /* Register Section */
        .register-section {
            margin-top: 40px;
        }

        .register-text {
            font-size: 16px;
            color: #333;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .register-btn {
            padding: 12px 35px;
            background-color: #c84c3d;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .register-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(200, 76, 61, 0.3);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }

            .logo-text {
                font-size: 32px;
            }

            .input-field {
                font-size: 16px;
                padding: 15px 20px;
            }
        }
    </style>
</head>

<body>
    <!-- Main Container -->
    <div class="container">
        <!-- Logo Icon -->
        <div class="logo-icon">
            <img src="resources/BlackBookLogo.png" class="book-svg" alt="BookXchange Logo">
        </div>

        <!-- Logo Text -->
        <h1 class="logo-text">Book<span class="highlight">X</span>change</h1>

        <!-- Form -->
        <form class="form-group" onsubmit="handleLogin(event)">
            <input type="email" class="input-field" placeholder="Email" required>
            <input type="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="login-btn">Log in</button>
        </form>

        <!-- Register Section -->
        <div class="register-section">
            <p class="register-text">Don't have an account?</p>
            <button class="register-btn" onclick="handleRegister()">Register</button>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const email = event.target[0].value;
            alert(`Welcome back to BookXchange, ${email}!`);
            event.target.reset();
        }

        function handleRegister() {
            alert('Redirecting to registration page...');
            // In a real app, this would navigate to /register
        }

        // Add subtle animation on page load
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            setTimeout(() => {
                container.style.transition = 'all 0.6s ease';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>

</html>
